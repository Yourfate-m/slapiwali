<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slapiwali</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        body, html {
            background-color: #000;
            color: #ff0000;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
            padding: 20px;
        }

        #overlay h2 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); color: #ff0000; }
            50% { transform: scale(1.05); color: #800000; }
        }

        .container {
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            width: 95%;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        #timer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem; /* Mobile default */
            border: 4px solid #ff0000;
            padding: 20px 5px;
            background: linear-gradient(180deg, #200000 0%, #000 100%);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
        }

        .unit-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .label {
            font-size: 0.6rem;
            margin-top: 5px;
            color: #660000;
        }

        .separator {
            margin: 0 5px;
            animation: blink 1s step-end infinite;
        }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            h1 { font-size: 2rem; letter-spacing: 4px; }
            #timer-container { font-size: 5rem; padding: 40px 60px; }
            .unit-box { min-width: 120px; }
            .label { font-size: 1rem; }
            #overlay h2 { font-size: 2rem; }
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay" onclick="startEverything()">
        <h2>CLICK TO FACE YOUR DESTINY</h2>
        <p style="color: #444; margin-top: 20px;">(Commissioned by the Slap Bet Commissioner Mr K)</p>
    </div>

    <div class="container">
        <h1>Dear Samanyu, Happy Slapiwali In</h1>
        <div id="timer-container">
            <div class="unit-box">
                <span id="days">00</span>
                <span class="label">DAYS</span>
            </div>
            <div class="separator">:</div>
            <div class="unit-box">
                <span id="hours">00</span>
                <span class="label">HRS</span>
            </div>
            <div class="separator">:</div>
            <div class="unit-box">
                <span id="minutes">00</span>
                <span class="label">MINS</span>
            </div>
            <div class="separator">:</div>
            <div class="unit-box">
                <span id="seconds">00</span>
                <span class="label">SECS</span>
            </div>
        </div>
    </div>

    <audio id="slap-audio" loop preload="auto">
        <source src="https://raw.githubusercontent.com/the-maldonado-group/Salty-Bot/master/sounds/youjustgotslapped.mp3" type="audio/mpeg">
    </audio>

    <script>
        const slapDate = new Date("November 8, 2026 13:00:00").getTime();
        const audio = document.getElementById("slap-audio");

        function startEverything() {
            document.getElementById("overlay").style.display = "none";
            audio.play().catch(e => console.log("Audio block:", e));
        }

        function updateTimer() {
            const now = new Date().getTime();
            const diff = slapDate - now;

            if (diff <= 0) {
                document.body.innerHTML = "<h1 style='font-size: 5rem; color: white; text-align: center; text-shadow: 0 0 20px #fff;'>SLAP!</h1>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
