<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slapiwali</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        body, html {
            background-color: #000;
            color: #ff0000;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The "Click to Enter" Overlay to bypass browser blocks */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #overlay h2 {
            font-size: 1.5rem;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .container {
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        #timer-container {
            display: flex;
            font-size: 5rem;
            border: 6px solid #ff0000;
            padding: 40px 60px;
            border-radius: 4px;
            background: linear-gradient(180deg, #200000 0%, #000 100%);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
        }

        .unit-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }

        .label {
            font-size: 1rem;
            margin-top: 10px;
            color: #660000;
        }

        .separator {
            margin: 0 10px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startEverything()">
        <h2>CLICK TO FACE YOUR DESTINY</h2>
        <p style="color: #444; margin-top: 20px;">(Commissioned by the Slap Bet Commissioner Mr K)</p>
    </div>

    <div class="container">
        <h1>Dear Samanyu, Happy Slapiwali In</h1>
        <div id="timer-container">
            <div class="unit-box">
                <span id="days">00</span>
                <span class="label">DAYS</span>
            </div>
            <div class="separator">:</div>
            <div class="unit-box">
                <span id="hours">00</span>
                <span class="label">HRS</span>
            </div>
            <div class="separator">:</div>
            <div class="unit-box">
                <span id="minutes">00</span>
                <span class="label">MINS</span>
            </div>
            <div class="separator">:</div>
            <div class="unit-box">
                <span id="seconds">00</span>
                <span class="label">SECS</span>
            </div>
        </div>
    </div>
<iframe width="0.5" height="1" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A115373669&color=%23ff5500&auto_play=true&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe><div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;"><a href="https://soundcloud.com/tony-nguyen-109" title="NGUY3N-!NG" target="_blank" style="color: #cccccc; text-decoration: none;">.</a> · <a href="https://soundcloud.com/tony-nguyen-109/you-just-got-slapped-marshall" title="ahm" target="_blank" style="color: #cccccc; text-decoration: none;">;-;</a></div>
    <audio id="slap-audio" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=You+Just+Got+Slapped&filename=mt/MTI3Mzg1MjgxMjczODc2_m_2be_2fL7jR_2bE.mp3" type="audio/mpeg">
    </audio>

    <script>
        const slapDate = new Date("November 8, 2026 13:00:00").getTime();
        const audio = document.getElementById("slap-audio");

        function startEverything() {
            // Hide overlay and play audio
            document.getElementById("overlay").style.display = "none";
            audio.play();
        }

        function updateTimer() {
            const now = new Date().getTime();
            const diff = slapDate - now;

            if (diff <= 0) {
                document.body.innerHTML = "<h1 style='font-size: 10rem; color: white;'>SLAP!</h1>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
